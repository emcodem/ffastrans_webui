/**
 * checks if there is one parent element containing the class
*/
function checkParentsForClass(element, targetClass, maxDepth = 10) {
    let currentElement = element;
    let depth = 0;

    while (currentElement && depth < maxDepth) {
        if (currentElement.classList && currentElement.classList.contains(targetClass)) {
            return true; // Found a parent with the target class
        }
        currentElement = currentElement.parentNode; // Move to the parent node
        depth++;
    }

    return false; // No parent with the class found within the depth limit
}

/*MAIN ENTRY POINT*/
function init() {
    /* 
        global overriden events using MutationObserver
    */

    document.body.addEventListener('wheel', function(e){ 
        /* disables scrolling inside processors, prevents subworkflow odd scrollbar behaviour */
        let hoveredEle = document.elementFromPoint(e.clientX, e.clientY).parentNode.parentNode;
        let disablescroll = checkParentsForClass(hoveredEle,"div_ffastrans_processor_container",10);
        if (disablescroll){
            // console.log("forced disable scroll because parent class div_ffastrans_processor_container" )
            e.preventDefault(); 
        }
            
    }, { passive: false });


    /*
        build everything
    */
    buildMainLayout();

    initLogGrid();
    initNodeGrid();


    console.log("Getting Job Details of " + getQueryVariable("job_id"))
    get_all_job_details(getQueryVariable("job_id"));

}

        }

                    if (!file) return;
                    
                    const formData = new FormData();
                    formData.append('file', file);
                    
                    try {
                        dhtmlx.message("Uploading " + file.name + "...");
                        const response = await fetch(build_new_api_url('/getjoblog'), {

function loadScriptAsync(url) {
    return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.type = "text/javascript";
        script.src = url;
        script.onload = () => resolve(script);
        script.onerror = () => reject(new Error(`Failed to load ${url}`));
        document.head.appendChild(script);
    });
}

function drawNestedSubWorkflows(workflow_json, available_workflows) {
    // Recursively find and draw all sub-workflow nodes
    if (!workflow_json || !workflow_json.nodes) return;
    
    console.log("drawNestedSubWorkflows called for workflow:", workflow_json.wf_id, "with", workflow_json.nodes.length, "nodes");
    
    // Convert available_workflows to a lookup object by wf_id for quick access
    var available_wfs_by_id = {};
    if (available_workflows) {
        if (Array.isArray(available_workflows)) {
            for (var j = 0; j < available_workflows.length; j++) {
                if (available_workflows[j] && available_workflows[j].wf_id) {
                    available_wfs_by_id[available_workflows[j].wf_id] = available_workflows[j];
                }
            }
        } else {
            // It's already an object keyed by wf_id
            available_wfs_by_id = available_workflows;
        }
    }
    
    console.log("Available workflow IDs:", Object.keys(available_wfs_by_id));
    
    for (var i = 0; i < workflow_json.nodes.length; i++) {
        var node = workflow_json.nodes[i];
        
        if (node.type === "sub_wf") {
            console.log("Found sub_wf node:", node.id, "properties:", node.properties);
            var container_id = "graphContainer_" + node.id.toUpperCase();
            var _subwfdiv = document.getElementById(container_id);
            
            if (!_subwfdiv) {
                var description_container = document.getElementById(node.id.toUpperCase() + "_description_container");
                console.log("Looking for description_container:", node.id.toUpperCase() + "_description_container", "found:", !!description_container);
                if (description_container) {
                    _subwfdiv = document.createElement("div");
                    _subwfdiv.id = container_id;
                    _subwfdiv.style.width = "100%";
                    _subwfdiv.style.height = "100%";
                    _subwfdiv.style.backgroundColor = "white";
                    //_subwfdiv.style.overflow = "auto"; //we want the parent to overflow, subwf div is too flaky on the page
                    description_container.appendChild(_subwfdiv);
                }
            }
            
            // Try to find and render the correct workflow for this specific node
            if (_subwfdiv && _subwfdiv.children.length === 0) {
                // First try to get workflow_id from the node's properties (most reliable)
                var target_wf_id = null;
                if (node.properties && node.properties.workflow_id) {
                    target_wf_id = node.properties.workflow_id;
                }
                // Fallback to m_subWorkflows mapping (populated during log processing)
                if (!target_wf_id) {
                    target_wf_id = m_subWorkflows[node.id] || m_subWorkflows[node.id.toUpperCase()] || m_subWorkflows[node.id.toLowerCase()];
                }
                
                console.log("Target workflow ID for node", node.id, ":", target_wf_id, "exists in available:", !!available_wfs_by_id[target_wf_id]);
                
                var wf_to_render = null;
                if (target_wf_id && available_wfs_by_id[target_wf_id]) {
                    // Found the specific workflow for this node
                    wf_to_render = available_wfs_by_id[target_wf_id];
                }
                
                if (wf_to_render && wf_to_render !== workflow_json) {
                    console.log("Drawing nested sub-workflow for node:", node.id, "with wf_id:", target_wf_id, "nodes count:", wf_to_render.nodes ? wf_to_render.nodes.length : 0);
                    buildMxGraph(_subwfdiv, wf_to_render, true);
                    // Recursively draw nested sub-workflows within this one
                    drawNestedSubWorkflows(wf_to_render, available_wfs_by_id);
                } else {
                    console.log("Could not render sub-workflow for node:", node.id, "wf_to_render:", !!wf_to_render, "same as parent:", wf_to_render === workflow_json);
                }
            } else {
                console.log("Container not found or already has children for node:", node.id, "_subwfdiv:", !!_subwfdiv, "children:", _subwfdiv ? _subwfdiv.children.length : 'N/A');
            }
        }
    }
}

function buildMxGraph(container,workflow_json,panning = true) { //panning allows dragging/moving the graph
    console.log("Graph conatiner id:",container.id)
    //set default box sizes as defined by ffastrans.au3
    var i_multiply = 4
    var i_BOX_WIDTH = 115 * i_multiply;
    var i_BOX_HEIGHT = i_BOX_WIDTH / 1.6;
    var i_POS_FACTOR = 1;
    console.log("workflow_json",workflow_json)
    if (workflow_json.variable) {
        //current zoom level stored in workflow.json
        if (workflow_json.variable.wf_size) {
            //i_BOX_WIDTH = (m_workflowdata["variable"]["wf_size"]);
            
            //at wf_size 115, the box width has to be 115, any other wf_size 
            i_POS_FACTOR = (workflow_json.variable.wf_size / 115 ) / i_multiply ;
        }
    }


    // Checks if the browser is supported
    if (!mxClient.isBrowserSupported()) {
        // Displays an error message if the browser is not supported.
        mxUtils.error('Browser is not supported!', 200, false);
    } else {
        // Disables the built-in context menu
        mxEvent.disableContextMenu(container);

        // Creates the graph inside the given container
        var graph = new mxGraph(container);
        
        // Prevent panning the main graph if the drag started inside a sub-workflow container.
        // There are TWO pathways that activate panning:
        //   1. isPanningTrigger — checked in mouseDown
        //   2. isForcePanningEvent — fired via FIRE_MOUSE_EVENT listener when ignoreCell=true, bypasses #1
        // We must block BOTH for the main graph container when the event originates inside a sub-workflow.
        function isInsideSubWorkflow(me) {
            let target = me.getEvent ? me.getEvent().target : me.target;
            let currentElement = target;
            while (currentElement && currentElement !== document.body) {
                if (currentElement.classList && currentElement.classList.contains("div_ffastrans_processor_desc")) {
                    return true;
                }
                currentElement = currentElement.parentNode;
            }
            return false;
        }

        var originalIsPanningTrigger = graph.panningHandler.isPanningTrigger;
        graph.panningHandler.isPanningTrigger = function(me) {
            if (this.graph.container.id === 'graphContainer' && isInsideSubWorkflow(me)) {
                return false;
            }
            return originalIsPanningTrigger.apply(this, arguments);
        };

        var originalIsForcePanningEvent = graph.panningHandler.isForcePanningEvent;
        graph.panningHandler.isForcePanningEvent = function(me) {
            if (this.graph.container.id === 'graphContainer' && isInsideSubWorkflow(me)) {
                return false;
            }
            return originalIsForcePanningEvent.apply(this, arguments);
        };
        
        // Override fit() to prevent excessive zoom on small workflows
        const originalFit = graph.fit;
        graph.fit = function() {
            originalFit.apply(this, arguments);
            if (this.view.scale > 1.0) {
                this.zoomTo(1.0, true);
            }
        };
        
        graph.autoExtend=true;
        graph.border = 50;
        //graph.resizeContainer=true;
        m_graphs_by_container_id[container.id] = graph;
        if (!m_graph) //first graph becomes main graph, html buttons work with it...
            m_graph = graph; 

        graph.setHtmlLabels(true);
        graph.panningHandler.ignoreCell = true; //when false, panning ignores cells and allows clicking them
        graph.setPanning(panning); 
        if (!panning)
            graph.useScrollbarsForPanning = true;
        
        // Disable cell editing on double-click
        graph.setCellsEditable(false);
        
        // Increase tolerance for drag vs click - only consider it a drag if mouse moves more than this many pixels
        graph.tolerance = 10;
        
        //     evt.preventDefault();
        //     evt.consume();
        // });

        
        //mxPanningHandler(graph);
        graph.setCellsMovable(false)
        graph.setCellsSelectable(false)
        //trackColor = new mxCellTracker(graph, "#666");
        
        graph.getLabel = function (cell) { //takes care of the table styling and inserts ffastrans values into the cells
            if (this.getModel().isVertex(cell) && cell.ffastransobj) {
                if (cell.value == "zoom"){
                    return "";
                }
                //calculate the text to display on canvas
                var FF_NODE_TITLE   = escapeXml(cell.ffastransobj["name"] || cell.ffastransobj["type"]);
                var FF_NODE_DESC    = escapeXml(cell.ffastransobj["description"] || "");
                var FF_NODE_ID      = cell.ffastransobj["id"].toUpperCase();
                var FF_NODE_TYPE    = cell.ffastransobj["type"];
                
                // Add container prefix to make HTML table IDs unique across graphs
                var TABLE_ID_PREFIX = this.container.id + "_";

                //create the cell style
                if (this.isCellCollapsed(cell))//we dont support collapsing
                    return;
                
                window.subWfCtrlBtnClick = function(evt,clickedEle){
                    //onmousedown="event.preventDefault();event.stopPropagation();onmouseup="event.preventDefault();event.stopPropagation();";ondblclick="event.preventDefault();event.stopPropagation();"
                    event.preventDefault();

                    let graphid = clickedEle.dataset.wfContainer;

                    if (action == "undock"){
                        //emit dblclick on parent triggers dhxwindow open

                    }
                    else{

                        }
                        if (targetGraph) {
                            targetGraph[action]();
                        }
                    }
                }
                //base cell obj
                let sub_wf_btns = `<div class="sub_wf_ctrl_icons">`+
                        `<span onclick="subWfCtrlBtnClick(event,this)" ondblclick="event.stopPropagation();" data-wf-container="${FF_NODE_ID}_description_container" class="mdi mdi-plus"               name="zoomIn"></span>`+
                        `<span onclick="subWfCtrlBtnClick(event,this)" ondblclick="event.stopPropagation();" data-wf-container="${FF_NODE_ID}_description_container" class="mdi mdi-minus"              name="zoomOut"></span>`+
                        `<span onclick="subWfCtrlBtnClick(event,this)" ondblclick="event.stopPropagation();" data-wf-container="${FF_NODE_ID}_description_container" class="mdi mdi-arrow-collapse-all" name="fit"></span>` + 
                        `<span onclick="subWfCtrlBtnClick(event,this)" ondblclick="event.stopPropagation();" data-wf-container="${FF_NODE_ID}_description_container" class="mdi mdi-dock-window"        name="undock"></span>` +

                if (FF_NODE_TYPE != "sub_wf"){
                    sub_wf_btns = "";
                    description_container_classes = "";
                }
                
                var tbl = '<div class="div_ffastrans_processor_container" style="overflow:hidden;width:' + i_BOX_WIDTH + 'px;height:' + i_BOX_HEIGHT + 'px;max-height:' + i_BOX_HEIGHT + 'px">' +
                            '<table name="gui_node" style="table-layout:fixed;width:' + i_BOX_WIDTH + 'px;height:' + i_BOX_HEIGHT + 'px" ' +
                            'class="table_ffastrans_processor_disabled" id = "' + TABLE_ID_PREFIX + FF_NODE_ID + '" > ' +
                            '<tr class="tr_ffastrans_processor_top" >' +
                                `<th width="100%" title="'${FF_NODE_TITLE}'"><span id="${TABLE_ID_PREFIX}${FF_NODE_ID}_exec_count" class="exec_count" title="Execution Counter">0</span><div><span>` + FF_NODE_TITLE + "</span>" +

function filterLogByNodeId(nodeId, branch){
    /* visually filters log  */
    toggleNodeSelected(nodeId);

    if (!nodeId){
        m_logGrid.data.filter();
        return;
    }

    m_logGrid.data.filter(function(item) {
        if (!item.node || !item.node.id) return false;
        
        let match = item.node.id.toUpperCase() === nodeId.toUpperCase();
        if (branch) {
            match = match && (item.split_id == branch);
        }
        return match;
    });
    
    // If we have matches, auto-show detail for the first one if only a few items
    if (m_logGrid.data.getLength() > 0 && m_logGrid.data.getLength() < 50) {
        try {
            let firstId = m_logGrid.data.getId(0);
            if (firstId) {
                m_logGrid.selection.setCell(firstId);
            }
        } catch(e) {
            console.error("Error auto-selecting first log entry:", e);
        }
    }
}
            

function calculateLogGridRowHeight(item) {
    if (!window._logGridMeasureContainer) {
        window._logGridMeasureContainer = document.createElement("div");
        window._logGridMeasureContainer.style.position = "absolute";
        window._logGridMeasureContainer.style.left = "-9999px";
        window._logGridMeasureContainer.style.visibility = "hidden";
        window._logGridMeasureContainer.style.fontFamily = "var(--dhx-font-family, sans-serif)";
        window._logGridMeasureContainer.style.fontSize = "14px";
        window._logGridMeasureContainer.style.lineHeight = "20px";
        document.body.appendChild(window._logGridMeasureContainer);
    }
    const tempContainer = window._logGridMeasureContainer;
    
    // Estimate data_preview column width for accurate text wrapping
    let dataPreviewWidth = 400;
    try {
        const gridContainer = document.getElementById("log_grid_container");
        const totalWidth = gridContainer ? gridContainer.offsetWidth : 1200;
        // Subtract fixed column widths + scrollbar + extra buffer for cell paddings
        const fixedWidth = 150 + 160 + 120 + 80 + 150 + 20; 
        dataPreviewWidth = Math.max(totalWidth - fixedWidth - 30, 400); 
    } catch(e) {}

    tempContainer.style.width = dataPreviewWidth + "px";

    try {
        const table = JsonHuman.format(item.data || item._data || {});
        // Wrap exactly like the grid cell template to account for padding and box model
        tempContainer.innerHTML = `<div class="dhx_grid-cell__content dhx_grid-cell__content_auto-height" style="padding: 4px 0;">${table.outerHTML}</div>`;
        // Add a generous buffer for borders, collapsed margins, and grid rendering nuances
        return Math.max(tempContainer.scrollHeight + 30, 32); 
    } catch(e) {
        return 32;
    }
}

function initLogGrid() {
    const columns = [
        { 
            id: "node_name", 
            header: [{ text: "Node" }, { content: "inputFilter" }], 
            width: 150,
            template: function(val, item) {
                return `<div class="celltext" title="${val}">${val}</div>`;
            }
        },
        { 
            id: "created_fmt", 
            header: [{ text: "Time" }, { content: "inputFilter" }], 
            width: 160 
        },
        { 
            id: "host", 
            header: [{ text: "Host" }, { content: "selectFilter" }], 
            width: 120,
            template: function(val) {
                if (!val) return "";
                let hash = 0;
                for (let i = 0; i < val.length; i++) {
                    hash = val.charCodeAt(i) + ((hash << 5) - hash);
                    hash |= 0; // Ensure 32-bit integer
                }
                
                // Use the golden angle approximation (137.508) to spread colors widely 
                // even for very similar strings (like INGEST01 vs INGEST05)
                const hue = Math.abs(hash * 137.508) % 360;
                const isDark = document.documentElement.getAttribute("data-theme") === "dark";
                
                let style = "";
                if (isDark) {
                    style = `background: hsla(${hue}, 40%, 15%, 0.4); color: hsl(${hue}, 80%, 85%); border: 1px solid hsla(${hue}, 40%, 30%, 0.5);`;
                } else {
                    style = `background: hsla(${hue}, 60%, 95%, 0.5); color: hsl(${hue}, 60%, 25%); border: 1px solid hsla(${hue}, 60%, 80%, 0.5);`;
                }
                
                return `<span class="log-event-badge" style="${style}">${val}</span>`;
            }
        },
        { 
            id: "split_id", 
            header: [{ text: "Branch" }, { content: "inputFilter" }], 
            width: 80 
        },
        { 
            id: "event", 
            header: [{ text: "Event" }, { content: "selectFilter" }], 
            width: 150,
            template: function(val) {
                let css = "log-event-info";
                if (val.toLowerCase().includes("error") || val.toLowerCase().includes("fail")) css = "log-event-error";
                if (val.toLowerCase().includes("success") || val.toLowerCase().includes("end")) css = "log-event-success";
                return `<span class="log-event-badge ${css}">${val}</span>`;
            }
        },
        { 
            id: "data_preview", 
            header: [{ text: "Data Preview" }, { content: "inputFilter" }], 
            adjust: true,
            minWidth: 400,
            template: function(val, item) {
                const showFull = document.getElementById("render_all_details")?.checked;
                if (showFull) {
                    try {
                        const table = JsonHuman.format(item.data || item._data || {});
                        return `<div class="dhx_grid-cell__content dhx_grid-cell__content_auto-height" style="padding: 4px 0; overflow-x: auto; max-width: 100%;">${table.outerHTML}</div>`;
                    } catch(e) {
                        return `<div class="dhx_grid-cell__content" style="color:var(--status-error)">Error: ${e.message}</div>`;
                    }
                }
                return `<div class="dhx_grid-cell__content" style="color:var(--text-secondary); font-style:italic; max-height:20px; overflow:hidden;">${val}</div>`;
            }
        }
    ];

    m_logGrid = new dhx8.dhx.Grid("log_grid_container", {
        columns,
        autoWidth: false,
        width: "100%",
        resizable: true,
        selection: "row",
        rowHeight: 32,
        multiline: true,
        headerRowHeight: 30,
        editable: false,
        keyNavigation: true,
        
        htmlEnable: true
    });
    
    m_logGrid.selection.events.on("AfterSelect", (row, column) => {
        const showFull = document.getElementById("render_all_details")?.checked;
        if (row && !showFull) {
            showLogDetail(row);
        }
    });
    m_logGrid.selection.events.on("AfterUnSelect", (row, column) => {
        console.log("afterUnSelect", row, column); 
    });

    m_logGrid.data.events.on("filter", () => {
        if (m_logSubLayout && m_logSubLayout.cells("b")) {
            m_logSubLayout.cells("b").collapse();
        }
    });

    // Global filter from the search input
    document.querySelector("input[name='log_filter']").addEventListener("input", function(e) {
        const val = e.target.value.toLowerCase();
        if (!val) {
            m_logGrid.data.filter();
            return;
        }
        m_logGrid.data.filter(function(item) {
            return JSON.stringify(item).toLowerCase().includes(val);
        });
    });

    const renderDetailsCheckbox = document.getElementById("render_all_details");
    const savedFullDetailsState = localStorage.getItem("ffastrans_log_full_details");
    if (savedFullDetailsState === "true") {
        renderDetailsCheckbox.checked = true;
    }

    renderDetailsCheckbox.addEventListener("change", async function() {
        const isChecked = this.checked;
        localStorage.setItem("ffastrans_log_full_details", isChecked);
        showLoading();
        // Give UI a chance to show spinner
        await new Promise(r => setTimeout(r, 10));

        m_logGrid.data.forEach(item => {
            if (isChecked) {
                item.$height = calculateLogGridRowHeight(item);
            } else {
                item.$height = 32;
            }
        });

        if (!isChecked) {
            m_logGrid.scroll(0, 0);
        }

        m_logGrid.adjustColumnWidth("data_preview");
        m_logGrid.paint();
        hideLoading();
    });

    // Intercept all grid events for debugging
    const originalFire = m_logGrid.events.fire;
    m_logGrid.events.fire = function(eventName, args) {
        const noisyEvents = ["scroll", "afterPaint", "cellMouseMove"];
        if (!noisyEvents.includes(eventName)) {
            console.log(`Grid Event: ${eventName}`, args);
        }
        return originalFire.apply(this, arguments);
    };
}

function copy_style_for_svg(ParentNode, OrigData){
    var Children = ParentNode.childNodes;
    var OrigChildDat = OrigData.childNodes;     
    var ContainerElements = ["svg","g"];
    
    for (var cd = 0; cd < Children.length; cd++){
        var Child = Children[cd];

        var TagName = Child.tagName;
        if (ContainerElements.indexOf(TagName) != -1){
            copy_style_for_svg(Child, OrigChildDat[cd])
        } else if (TagName){
            var StyleDef = window.getComputedStyle(OrigChildDat[cd]);
            var StyleString = "";
            for (var st = 0; st < StyleDef.length; st++){
                StyleString += StyleDef[st] + ":" + StyleDef.getPropertyValue(StyleDef[st]) + "; ";
            }
            Child.setAttribute("style",StyleString);
            copy_style_for_svg(Child, OrigChildDat[cd])
        }
    }
}

        }

        if ($("#graphContainer_" + nodeId).length > 0) {
            return "graphContainer_";
        }
        
        // Default to main graph container
        return "graphContainer_";
    }

        window.setPerformanceInfo("Parsing log Line " + (i + 1) + " of " + lines.length);

                                drawNestedSubWorkflows(sub_wf_json, response['workflows']);
                                
                            }catch(ex){
                                console.error("Error loading subworkflow:", ex);
                                alert("There was a problem getting subworkflow data, contact developers");
                            }
                            sub_workflow_is_loading = false;

                        },
                        error: function (xhr, status) {
                            sub_workflow_is_loading = false;
                            alert("ERROR getting workflow of job " + getQueryVariable("job_id") + ", please check FFAStrans Path in Admin settings on the left.. ");
                        }
                    }); 
                }
            }
            
            //wait until sub-wf is drawn in order to guarantee the nodes are already there
            while (sub_workflow_is_loading){
                await asyncsleep(1)
            }
                                
            //check if node is unique for nodegrid
            var new_key = line["node"]["id"] + line["split_id"]
            _proc_id = line["node"]["id"].toUpperCase();
            id_pid_mapping[line["pid"]] = _proc_id;

            //show processor as enabled on ui
            a_log_per_node[_proc_id] = [];
            
            // Find the correct container for this node
            var containerPrefix = getContainerPrefixForNode(_proc_id);
            
            // Apply appropriate styling based on node type
            if (line["node"]["type"] === "sub_wf") {
                $("#" + containerPrefix + _proc_id).removeClass("table_ffastrans_processor_disabled");
                $("#" + containerPrefix + _proc_id).addClass("table_ffastrans_sub_wf_enabled");
            } else {
                $("#" + containerPrefix + _proc_id).removeClass("table_ffastrans_processor_disabled");
                $("#" + containerPrefix + _proc_id).addClass("table_ffastrans_processor_enabled");
            }
            
            //check processor error state and count
            if (!m_unique_nodes[new_key]) {//this is the first log line with this processor on this branch
                m_unique_nodes[new_key] = (line);
                m_unique_nodes[new_key]["state"] = "running";
                //raise proc count on gui
                var _o_counter = $("#" + containerPrefix + _proc_id + "_exec_count");//execution count
                
                console.log("_o_counter","#" + containerPrefix + _proc_id + "_exec_count",_o_counter);
                _o_counter.html(parseInt(_o_counter[0].innerHTML) + 1)

                //progress-circle
                $("#" + containerPrefix + _proc_id).parent().addClass("blinking-progress");

            }
            
            //check for processor end and state
            if (line["event"] == "node end") {
                m_unique_nodes[new_key]["date_end"] = line["created"];
                m_unique_nodes[new_key]["state"] = "success";
                $("#" + containerPrefix + _proc_id).parent().removeClass("blinking-progress");

                //red border for errored nodes
                if (line["data"] != null) { //when this exists, we have a node in error
                    $("#" + containerPrefix + _proc_id).parent().addClass("blinking-error");
                    m_unique_nodes[new_key]["state"] = "error";
                    node_has_errors = true;
                } 
            }

        } catch (ex) { }
        //sort the current line as accurate as possible
        if (line["pid"] != "undefined") { //we have a pid, perfect
            var id_from_pid = id_pid_mapping[line["pid"]];
            try{
                //a_log_per_node[id_from_pid].push(line);
            }catch(ex){
                debug = true;
            }
        } else {
            //did not get pid, so cannot guarantee that this line belongs to the proc but it is the best we can do...
            //a_log_per_node[_proc_id].push(line);
        }
    }
    window.setPerformanceInfo("Log parsing completed.");
    console.timeEnd("parseJobLog");
}

function initNodeGrid() {
    console.log("initNodeGrid");
    
    const columns = [
        { 
            id: "state", 
            header: [{ text: "State" },{content: "selectFilter" }], 
            width: 100, 
            sortable: true,
            template: function(val) {
                if (!val) return "";
                let css = "log-event-info";
                if (val.toLowerCase().includes("error") || val.toLowerCase().includes("fail")) css = "log-event-error";
                if (val.toLowerCase().includes("success") || val.toLowerCase().includes("end")) css = "log-event-success";
                return `<span class="log-event-badge ${css}">${val}</span>`;
            }
        },
        { id: "name",    header: [{ text: "Name" }, {content: "selectFilter" }]},
        { id: "start",   header: [{ text: "Start" }, {content: "inputFilter" }],       width:100},
        { id: "duration",   header: [{ text: "Duration" }, {content: "selectFilter" }], width:100},
        { 
            id: "host", 
            header: [{ text: "Host" },   {content: "selectFilter" }], 
            sortable: true,
            template: function(val) {
                if (!val) return "";
                let hash = 0;
                for (let i = 0; i < val.length; i++) {
                    hash = val.charCodeAt(i) + ((hash << 5) - hash);
                    hash |= 0;
                }
                const hue = Math.abs(hash * 137.508) % 360;
                const isDark = document.documentElement.getAttribute("data-theme") === "dark";
                let style = "";
                if (isDark) {
                    style = `background: hsla(${hue}, 40%, 15%, 0.4); color: hsl(${hue}, 85%, 85%); border: 1px solid hsla(${hue}, 40%, 30%, 0.5);`;
                } else {
                    style = `background: hsla(${hue}, 60%, 95%, 0.5); color: hsl(${hue}, 60%, 25%); border: 1px solid hsla(${hue}, 60%, 80%, 0.5);`;
                }
                return `<span class="log-event-badge" style="${style}">${val}</span>`;
            }
        },
        { id: "branch",  header: [{ text: "Branch" }, {content: "inputFilter" }], sortable: true },
        { id: "node_id",     header: [{ text: "ID" }, {content: "inputFilter" }], },
    ];

    const nodeGrid = new dhx8.dhx.Grid("node_div", {
        columns,
        css: "alternate_row",
        resizable: true,
        keyNavigation: true,
        autoWidth:true,
        adjust: true,
        selection: "row",
        rowHeight: 28,
        headerRowHeight: 30,
        htmlEnable: true,
        eventHandlers: {
            onclick: {
              
            },
        },
    });
    nodeGrid.selection.events.on("AfterSelect", nodeGridSelect);

    function nodeGridSelect(data) {
        console.log("data",data);
        
        toggleNodeSelected(data.node_id.toUpperCase());
        filterLogByNodeId(data.node_id.toUpperCase(),data.branch);
        
        //check which graph contains the cell and center it
        Object.keys(m_graphs_by_container_id).forEach( key => {
            let g = m_graphs_by_container_id[key];
            let c = g.getModel().getCell(data.node_id.toUpperCase());
            if (c){
                g.scrollCellToVisible(c, true);
            }
            //todo: if this is a sub_wf, iterate back over all containing graphs and center the topmost one
        })
        
    }

    window.refreshNodeGrid = function(data){
        //transform data for dhxgrid easy loading, return obj state, node, start, host, branch
        data = data.map(o=>{
            let returnobj= {};
            returnobj.data    = o;
            returnobj.node_id    = o.node.id;
            returnobj.state = o.state;
            returnobj.name  = function(){
                if (o.node.name)
                    return o.node.name;
                else{
                    //try finding node name in all workflows (main and sub-workflows)
                    for (var _wf of m_workflows){
                        if (!_wf || !_wf.nodes) continue;
                        let _filt = _wf.nodes.filter(n=>{return n.id.toUpperCase()==o.node.id.toUpperCase()});
                        if (_filt.length > 0){
                            let nodeName = _filt[0].name;
                            return nodeName ? nodeName : o.node.type;
                        }
                    }
                    
                    return o.node.type;
                }
            }()
            returnobj.host  = o.host;
            returnobj.branch = o.split_id;
            try {
                let created = moment.parseZone(o["created"].replace(/.00$/, ":00"))
                let end = moment.parseZone(o["date_end"].replace(/.00$/, ":00"))
                returnobj.start     = created.format("HH:mm:ss");
                returnobj.duration  = end.diff(created, "seconds");
            } catch (ex) { }
            return returnobj;
        })

        console.log("refresNodeGrid",data);
        console.log("refresNodeGrid workflowdata",m_workflowdata);
        
        nodeGrid.data.parse(data);
    }

}

function getNodeName(nodeObj) {
    if (!nodeObj || !nodeObj.id){
        return "System";
    }
    if (nodeObj.name) {
        return nodeObj.name;
    }
    for (var _wf of m_workflows){
        if (!_wf || !_wf.nodes) continue;
        var n = _wf.nodes.filter(function (obj) { return obj.id && obj.id.toUpperCase() == nodeObj.id.toUpperCase(); });
        if (n.length > 0) {
            return n[0].name || n[0].type || nodeObj.type || "System";
        }
    }
    return nodeObj.type || "System";
}

function get_job_log(job_id, start=0, a_nodeid_filter, a_branchid_filter) { //branch_path is path field from finished branch json, array of node objects, they have id field which we filter
    start = typeof start !== 'undefined' ? start : 0;
    console.log("getjoblog START: " + start );
    //get all workflows from server  start main with the workflow of interest
    var _url = "/getjoblog?jobid=" + job_id+ "&start="+ start ;
    $.ajax({
        url: build_new_api_url(_url),
        type: "GET",
        crossDomain: true,
        dataType: "json",
        success: async function (response,status,request) {
        
            //PARSE JOB LOG
            await asyncsleep(10); // Give UI a chance to render layout for correct width measurement
            for (var a in response) {
                let item = response[a];
                item["_data"] = item["data"];
                
                try {
                    let created = moment.parseZone(item["created"].replace(/.00$/, ":00"));
                    item["created_fmt"] = created.format("YYYY-MM-DD HH:mm:ss");
                } catch(e) {
                    item["created_fmt"] = item["created"];
                }
                
                // Create a string preview of the data
                try {
                    let dataStr = JSON.stringify(item.data || {});
                    item["data_preview"] = dataStr.substring(0, 200) + (dataStr.length > 200 ? "..." : "");
                } catch(e) {
                    item["data_preview"] = "";
                }
            }

            if (a_nodeid_filter){
                //filter the log by nodeids specified
                response = response.filter(logline => a_nodeid_filter.indexOf(logline.node?.id) != -1);
            }
            if (a_branchid_filter){
                //filter log by branchid specified
                response = response.filter(logline => a_branchid_filter.indexOf(logline.split_id) != -1);
            }
            await parseJobLog(response);
            
            // Assign node names AFTER parseJobLog so that m_workflows includes any dynamically loaded sub-workflows
            for (var a in response) {
                response[a]["node_name"] = getNodeName(response[a].node);
            }
            
            var type = request.getResponseHeader('ffastrans_log_type');
            if (type == "partial") {
                var _start = request.getResponseHeader('ffastrans_log_last_endpos');
                console.log("Job still running, getting next log lines from start: " + _start);
                window.setTimeout(function () { get_job_log(job_id, _start)}, 3000);
                
                if (m_logSubLayout && m_logSubLayout.cells("b")) {
                    m_logSubLayout.cells("b").collapse();
                }
                m_logGrid.data.parse(response);
                if (document.getElementById("render_all_details")?.checked) {
                    m_logGrid.data.forEach(item => {
                        item.$height = calculateLogGridRowHeight(item);
                    });
                    m_logGrid.adjustColumnWidth("data_preview");
                    m_logGrid.paint();
                }
            } else {
                window.setPerformanceInfo("Rendering log...");
                showLoading()
                try{
                    await asyncsleep(10);
                    if (m_logSubLayout && m_logSubLayout.cells("b")) {
                        m_logSubLayout.cells("b").collapse();
                    }
                    m_logGrid.data.parse(response);
                    if (document.getElementById("render_all_details")?.checked) {
                        m_logGrid.data.forEach(item => {
                            item.$height = calculateLogGridRowHeight(item);
                        });
                        m_logGrid.adjustColumnWidth("data_preview");
                        m_logGrid.paint();
                    }
                    window.setPerformanceInfo("Rendering log done.");
                }catch(ex){}
                finally{
                    hideLoading()
                }
            }


            //load data into node grid
            //turn m_unique_nodes to array
            var result = Object.keys(m_unique_nodes).map(function (key) {
                m_unique_nodes[key]["key"] = key;
                return m_unique_nodes[key];
            });

            //add nodegrid rows
            refreshNodeGrid(result);

        },
        error: function (xhr, status) {
            alert("Did not get Log for job " + job_id);
        }
    });
}

function copyToClipboard(text) {
    if (!navigator.clipboard) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        try {
            document.execCommand('copy');
        } catch (err) {}
        document.body.removeChild(textArea);
        return;
    }
    navigator.clipboard.writeText(text).catch(err => console.error(err));
}

function getQueryVariable(variable) {
    var query = window.location.search.substring(1);
    var vars = query.split("&");
    for (var i = 0; i < vars.length; i++) {
        var pair = vars[i].split("=");
        if (pair[0] == variable) {
            return decodeURIComponent(pair[1]);
        }
    }
}

function asyncsleep(time) {
  return new Promise(resolve => {
    setTimeout(() => {
      resolve();
    }, time);
  });
}

function escapeXml(unsafe) {
    return unsafe.replace(/[<>&'"]/g, function (c) {
        switch (c) {
            case '<': return '&lt;';
            case '>': return '&gt;';
            case '&': return '&amp;';
            case '\'': return '&apos;';
            case '"': return '&quot;';
        }
    });
}

    localStorage.setItem(name + "_aw", aw);
